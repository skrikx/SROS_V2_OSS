name: release-verify

on:
  push:
    tags:
      - "v*"
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-verify-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-pack-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run release pack script
        run: bash ./scripts/release_pack.sh

      - name: Run verification command
        run: go run ./cmd/sros verify

      - name: Assert release artifacts were generated
        run: |
          ls -1 artifacts/releases
          test -n "$(find artifacts/releases -maxdepth 1 -type f -name '*.json' -print -quit)"
