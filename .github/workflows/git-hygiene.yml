name: git-hygiene

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: git-hygiene-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard tracked binary and archive junk
        run: |
          tracked_bad="$(git ls-files | grep -E '\.(exe|dll|so|dylib|zip|tar|gz|7z)$' || true)"
          if [ -n "$tracked_bad" ]; then
            echo "tracked_junk_detected"
            echo "$tracked_bad"
            exit 1
          fi

      - name: Guard tracked generated artifacts
        run: |
          tracked_artifacts="$(git ls-files artifacts | grep -v '^artifacts/.keep$' || true)"
          if [ -n "$tracked_artifacts" ]; then
            echo "tracked_artifacts_detected"
            echo "$tracked_artifacts"
            exit 1
          fi

      - name: Guard unresolved merge markers
        run: |
          if git grep -n -E '^(<<<<<<<|=======|>>>>>>>)' -- . >/dev/null; then
            echo "merge_markers_detected"
            git grep -n -E '^(<<<<<<<|=======|>>>>>>>)' -- .
            exit 1
          fi

      - name: Check whitespace and conflict markers
        run: git diff --check

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run go vet
        run: go vet ./...
